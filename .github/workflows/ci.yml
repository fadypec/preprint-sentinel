name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python lint & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: durc
          POSTGRES_PASSWORD: test
          POSTGRES_DB: durc_triage
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check pipeline/ tests/
      - name: Format check (ruff)
        run: ruff format --check pipeline/ tests/
      - name: Type check (mypy)
        run: mypy pipeline/
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://durc:test@localhost:5432/durc_triage
          ANTHROPIC_API_KEY: sk-ant-test-not-real
        run: pytest tests/ -v --tb=short

  dashboard:
    name: Dashboard lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Lint (ESLint)
        run: npm run lint
      - name: Type check (tsc)
        run: npx tsc --noEmit
