services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: durc
      POSTGRES_PASSWORD: durc_local
      POSTGRES_DB: durc_triage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U durc"]
      interval: 5s
      retries: 3

volumes:
  pgdata:
