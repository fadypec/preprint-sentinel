<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1235" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="ingestGrad" x1="0%" y1="0%" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="dedupGrad" x1="0%" y1="0%" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="coarseGrad" x1="0%" y1="0%" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="fulltextGrad" x1="0%" y1="0%" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="methodsGrad" x1="0%" y1="0%" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="enrichGrad" x1="0%" y1="0%" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="adjGrad" x1="0%" y1="0%" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="dashGrad" x1="0%" y1="0%" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="rejectGrad" x1="0%" y1="0%" x2="1" y2="0">
      <stop offset="0%" stop-color="#fecaca"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowSm" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="1235" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a" letter-spacing="-0.02em">Preprint Sentinel Pipeline</text>
  <text x="450" y="72" text-anchor="middle" font-size="13" fill="#64748b">Daily AI screening of life sciences preprints for dual-use research indicators</text>

  <!-- ==================== ROW 1: PRIMARY SOURCES ==================== -->
  <text x="450" y="95" text-anchor="middle" font-size="9.5" fill="#94a3b8" font-weight="600" letter-spacing="0.08em">PRIMARY SOURCES</text>

  <g filter="url(#shadowSm)">
    <rect x="90" y="104" width="155" height="54" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="90" y="104" width="155" height="4" rx="2" fill="#3b82f6"/>
    <text x="167" y="129" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">bioRxiv</text>
    <text x="167" y="146" text-anchor="middle" font-size="11" fill="#64748b">22,800 papers</text>
  </g>
  <g filter="url(#shadowSm)">
    <rect x="265" y="104" width="155" height="54" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="265" y="104" width="155" height="4" rx="2" fill="#3b82f6"/>
    <text x="342" y="129" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">medRxiv</text>
    <text x="342" y="146" text-anchor="middle" font-size="11" fill="#64748b">8,600 papers</text>
  </g>
  <g filter="url(#shadowSm)">
    <rect x="440" y="104" width="155" height="54" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="440" y="104" width="155" height="4" rx="2" fill="#60a5fa"/>
    <text x="517" y="125" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">PubMed</text>
    <text x="517" y="139" text-anchor="middle" font-size="9.5" fill="#94a3b8">MeSH-filtered</text>
    <text x="517" y="152" text-anchor="middle" font-size="11" fill="#64748b">11,200 papers</text>
  </g>
  <g filter="url(#shadowSm)">
    <rect x="615" y="104" width="155" height="54" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="615" y="104" width="155" height="4" rx="2" fill="#60a5fa"/>
    <text x="692" y="129" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Europe PMC</text>
    <text x="692" y="146" text-anchor="middle" font-size="11" fill="#64748b">24,500 papers</text>
  </g>

  <!-- ==================== CONVERGING CONNECTORS (Row 1 bracket, drawn behind Row 2) ==================== -->
  <!-- Vertical stubs from each primary source -->
  <line x1="167" y1="158" x2="167" y2="164" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="342" y1="158" x2="342" y2="164" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="517" y1="158" x2="517" y2="164" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="692" y1="158" x2="692" y2="164" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Horizontal rail connecting all primary sources -->
  <line x1="167" y1="164" x2="692" y2="164" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Vertical trunk through gap between ChemRxiv and Zenodo -->
  <line x1="479" y1="164" x2="479" y2="263" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- ==================== ROW 2: SECONDARY SOURCES ==================== -->
  <text x="450" y="198" text-anchor="middle" font-size="9.5" fill="#94a3b8" font-weight="600" letter-spacing="0.08em">SECONDARY SOURCES</text>

  <g filter="url(#shadowSm)">
    <rect x="74" y="205" width="120" height="50" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="74" y="205" width="120" height="4" rx="2" fill="#93c5fd"/>
    <text x="134" y="229" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">arXiv</text>
    <text x="134" y="245" text-anchor="middle" font-size="10" fill="#64748b">2,400 papers</text>
  </g>
  <g filter="url(#shadowSm)">
    <rect x="212" y="205" width="120" height="50" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="212" y="205" width="120" height="4" rx="2" fill="#93c5fd"/>
    <text x="272" y="229" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Res. Square</text>
    <text x="272" y="245" text-anchor="middle" font-size="10" fill="#64748b">4,800 papers</text>
  </g>
  <g filter="url(#shadowSm)">
    <rect x="350" y="205" width="120" height="50" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="350" y="205" width="120" height="4" rx="2" fill="#93c5fd"/>
    <text x="410" y="229" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">ChemRxiv</text>
    <text x="410" y="245" text-anchor="middle" font-size="10" fill="#64748b">4,200 papers</text>
  </g>
  <g filter="url(#shadowSm)">
    <rect x="488" y="205" width="120" height="50" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="488" y="205" width="120" height="4" rx="2" fill="#93c5fd"/>
    <text x="548" y="229" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Zenodo</text>
    <text x="548" y="245" text-anchor="middle" font-size="10" fill="#64748b">650 papers</text>
  </g>
  <g filter="url(#shadowSm)">
    <rect x="626" y="205" width="120" height="50" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="626" y="205" width="120" height="4" rx="2" fill="#93c5fd"/>
    <text x="686" y="229" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">SSRN</text>
    <text x="686" y="245" text-anchor="middle" font-size="10" fill="#64748b">280 papers</text>
  </g>

  <!-- ==================== CONVERGING CONNECTORS (Row 2 bracket + merge) ==================== -->
  <!-- Vertical stubs from each secondary source -->
  <line x1="134" y1="255" x2="134" y2="263" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="272" y1="255" x2="272" y2="263" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="410" y1="255" x2="410" y2="263" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="548" y1="255" x2="548" y2="263" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="686" y1="255" x2="686" y2="263" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 3"/>
  <!-- Horizontal rail connecting all secondary sources -->
  <line x1="134" y1="263" x2="686" y2="263" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 3"/>
  <!-- Merge: two rounded 90-degree corners from trunk to Ingestion center -->
  <path d="M479,263 V267 A8,8 0 0,1 471,275 H458 A8,8 0 0,0 450,283 V289" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>

  <!-- ==================== INGESTION ==================== -->
  <g filter="url(#shadow)">
    <rect x="240" y="293" width="420" height="68" rx="10" fill="url(#ingestGrad)"/>
    <text x="450" y="319" text-anchor="middle" font-size="14" font-weight="600" fill="white">Ingestion &amp; Normalisation</text>
    <text x="450" y="338" text-anchor="middle" font-size="11" fill="#bfdbfe">incl. non-English translation</text>
    <text x="450" y="354" text-anchor="middle" font-size="12" fill="#dbeafe">79,430 papers from 9 sources</text>
  </g>

  <!-- Arrow -->
  <line x1="450" y1="361" x2="450" y2="387" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== DEDUPLICATION ==================== -->
  <g filter="url(#shadow)">
    <rect x="240" y="393" width="420" height="72" rx="10" fill="url(#dedupGrad)"/>
    <text x="450" y="422" text-anchor="middle" font-size="14" font-weight="600" fill="white">Deduplication</text>
    <text x="450" y="441" text-anchor="middle" font-size="11" fill="#c7d2fe">DOI match &#8594; fuzzy title+author &#8594; title+date</text>
    <text x="450" y="457" text-anchor="middle" font-size="12" fill="#e0e7ff">79,430 unique papers</text>
  </g>

  <!-- Arrow -->
  <line x1="450" y1="465" x2="450" y2="491" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== COARSE FILTER ==================== -->
  <g filter="url(#shadow)">
    <rect x="240" y="497" width="420" height="82" rx="10" fill="url(#coarseGrad)"/>
    <!-- Model badge -->
    <rect x="563" y="503" width="86" height="20" rx="10" fill="rgba(255,255,255,0.2)"/>
    <text x="606" y="517" text-anchor="middle" font-size="10" font-weight="600" fill="white">Haiku 4.5</text>
    <text x="450" y="527" text-anchor="middle" font-size="14" font-weight="600" fill="white">Stage 1: Coarse Filter</text>
    <text x="450" y="546" text-anchor="middle" font-size="11" fill="#ddd6fe">Binary DURC relevance on title + abstract</text>
    <text x="450" y="568" text-anchor="middle" font-size="13" font-weight="600" fill="#fef3c7">350 flagged (0.44%)</text>
  </g>

  <!-- Rejection branch -->
  <line x1="660" y1="538" x2="682" y2="538" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <g filter="url(#shadowSm)">
    <rect x="690" y="517" width="185" height="42" rx="8" fill="url(#rejectGrad)" stroke="#fca5a5" stroke-width="1"/>
    <text x="782" y="536" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">79,080 filtered out</text>
    <text x="782" y="551" text-anchor="middle" font-size="10" fill="#ef4444">99.56% removed</text>
  </g>

  <!-- Arrow -->
  <line x1="450" y1="579" x2="450" y2="605" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== FULL TEXT ==================== -->
  <g filter="url(#shadow)">
    <rect x="240" y="611" width="420" height="72" rx="10" fill="url(#fulltextGrad)"/>
    <text x="450" y="640" text-anchor="middle" font-size="14" font-weight="600" fill="white">Stage 2: Full-Text Retrieval</text>
    <text x="450" y="659" text-anchor="middle" font-size="11" fill="#bae6fd">JATS XML &#8594; HTML &#8594; Europe PMC &#8594; PMC OA &#8594; Unpaywall</text>
    <text x="450" y="675" text-anchor="middle" font-size="11" fill="#e0f2fe">Methods section extraction</text>
  </g>

  <!-- Arrow -->
  <line x1="450" y1="683" x2="450" y2="709" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== METHODS ANALYSIS ==================== -->
  <g filter="url(#shadow)">
    <rect x="240" y="715" width="420" height="105" rx="10" fill="url(#methodsGrad)"/>
    <!-- Model badge -->
    <rect x="558" y="721" width="92" height="20" rx="10" fill="rgba(255,255,255,0.2)"/>
    <text x="604" y="735" text-anchor="middle" font-size="10" font-weight="600" fill="white">Sonnet 4.6</text>
    <text x="450" y="745" text-anchor="middle" font-size="14" font-weight="600" fill="white">Stage 3: Methods Analysis</text>
    <text x="450" y="764" text-anchor="middle" font-size="11" fill="#e9d5ff">6-dimension risk rubric (scored 0&#8211;18)</text>
    <!-- Dimension chips -->
    <text x="270" y="787" font-size="9" fill="#f3e8ff">Pathogen Enhancement</text>
    <text x="415" y="787" font-size="9" fill="#f3e8ff">Synthesis Barriers</text>
    <text x="560" y="787" font-size="9" fill="#f3e8ff">Select Agents</text>
    <text x="270" y="805" font-size="9" fill="#f3e8ff">Novel Techniques</text>
    <text x="405" y="805" font-size="9" fill="#f3e8ff">Information Hazard</text>
    <text x="545" y="805" font-size="9" fill="#f3e8ff">Defensive Framing</text>
  </g>

  <!-- Arrow -->
  <line x1="450" y1="820" x2="450" y2="846" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== ENRICHMENT ==================== -->
  <g filter="url(#shadow)">
    <rect x="240" y="852" width="420" height="62" rx="10" fill="url(#enrichGrad)"/>
    <text x="450" y="879" text-anchor="middle" font-size="14" font-weight="600" fill="white">Enrichment</text>
    <text x="450" y="902" text-anchor="middle" font-size="11" fill="#ccfbf1">OpenAlex + Semantic Scholar + ORCID</text>
  </g>

  <!-- Enrichment detail boxes -->
  <g filter="url(#shadowSm)">
    <rect x="30" y="859" width="185" height="48" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="122" y="880" text-anchor="middle" font-size="10" font-weight="600" fill="#0d9488">Author context</text>
    <text x="122" y="897" text-anchor="middle" font-size="9.5" fill="#64748b">h-index, citations, affiliations</text>
  </g>
  <g filter="url(#shadowSm)">
    <rect x="690" y="859" width="185" height="48" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="782" y="880" text-anchor="middle" font-size="10" font-weight="600" fill="#0d9488">Institutional context</text>
    <text x="782" y="897" text-anchor="middle" font-size="9.5" fill="#64748b">Oversight, funding, reputation</text>
  </g>
  <line x1="240" y1="883" x2="215" y2="883" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="660" y1="883" x2="690" y2="883" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Arrow -->
  <line x1="450" y1="914" x2="450" y2="940" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== ADJUDICATION ==================== -->
  <g filter="url(#shadow)">
    <rect x="240" y="946" width="420" height="72" rx="10" fill="url(#adjGrad)"/>
    <!-- Model badge -->
    <rect x="563" y="952" width="86" height="20" rx="10" fill="rgba(255,255,255,0.2)"/>
    <text x="606" y="966" text-anchor="middle" font-size="10" font-weight="600" fill="white">Opus 4.6</text>
    <text x="450" y="976" text-anchor="middle" font-size="14" font-weight="600" fill="white">Stage 4: Adjudication</text>
    <text x="450" y="995" text-anchor="middle" font-size="11" fill="#ffe4e6">Contextual review &#8212; risk tier adjusted up or down</text>
    <text x="450" y="1011" text-anchor="middle" font-size="12" fill="#fecdd3">110 papers adjudicated</text>
  </g>

  <!-- Arrow -->
  <line x1="450" y1="1018" x2="450" y2="1044" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== OUTPUT TIERS ==================== -->
  <g filter="url(#shadow)">
    <rect x="190" y="1050" width="520" height="68" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="450" y="1074" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Analyst Dashboard</text>

    <!-- Tier badges -->
    <rect x="225" y="1085" width="80" height="24" rx="12" fill="#dcfce7"/>
    <text x="265" y="1101" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">240 Low</text>

    <rect x="320" y="1085" width="105" height="24" rx="12" fill="#fef9c3"/>
    <text x="372" y="1101" text-anchor="middle" font-size="11" font-weight="600" fill="#ca8a04">70 Medium</text>

    <rect x="440" y="1085" width="85" height="24" rx="12" fill="#fed7aa"/>
    <text x="482" y="1101" text-anchor="middle" font-size="11" font-weight="600" fill="#ea580c">30 High</text>

    <rect x="540" y="1085" width="105" height="24" rx="12" fill="#fecaca"/>
    <text x="592" y="1101" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">10 Critical</text>
  </g>

  <!-- ==================== FOOTER ==================== -->
  <text x="450" y="1153" text-anchor="middle" font-size="11" fill="#94a3b8">Figures from production data: 79,430 papers across 164 days</text>
  <text x="450" y="1171" text-anchor="middle" font-size="11" fill="#94a3b8">Sources: bioRxiv, medRxiv, PubMed (MeSH), Europe PMC, arXiv, Res. Square, ChemRxiv, Zenodo, SSRN</text>

  <!-- ==================== COST ANNOTATION ==================== -->
  <g filter="url(#shadowSm)">
    <rect x="30" y="527" width="185" height="96" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="122" y="549" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Estimated daily cost</text>
    <line x1="48" y1="557" x2="198" y2="557" stroke="#e2e8f0" stroke-width="1"/>
    <text x="48" y="575" font-size="10" fill="#64748b">Haiku 4.5 (coarse filter)</text>
    <text x="200" y="575" text-anchor="end" font-size="10" font-weight="600" fill="#1e293b">~$0.80</text>
    <text x="48" y="591" font-size="10" fill="#64748b">Sonnet 4.6 (methods)</text>
    <text x="200" y="591" text-anchor="end" font-size="10" font-weight="600" fill="#1e293b">~$5.50</text>
    <text x="48" y="607" font-size="10" fill="#64748b">Opus 4.6 (adjudication)</text>
    <text x="200" y="607" text-anchor="end" font-size="10" font-weight="600" fill="#1e293b">~$3.50</text>
  </g>
</svg>
